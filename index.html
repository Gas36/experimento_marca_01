<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Lines — Creative Coding</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --fg: #ffffff;
    --panel: #111111;
    --border: #222222;
    --accent: #ffffff;
    --muted: #555555;
    --label: #888888;
    --font: 'Space Mono', monospace;
  }

  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font);
    font-size: 13px;
    height: 100%;
    overflow: hidden;
  }

  #layout {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── CANVAS ── */
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  canvas#main {
    display: block;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  /* ── PANEL ── */
  #panel {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    gap: 28px;
    align-items: center;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .ctrl-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-width: 120px;
  }

  .ctrl-label {
    color: var(--label);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: var(--border);
    outline: none;
    flex: 1;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--fg);
    cursor: pointer;
  }

  input[type=range]::-moz-range-thumb {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--fg);
    cursor: pointer;
    border: none;
  }

  .val {
    font-size: 11px;
    color: var(--fg);
    min-width: 32px;
    text-align: right;
    letter-spacing: 0.04em;
  }

  select {
    background: #1a1a1a;
    color: var(--fg);
    border: 1px solid var(--border);
    font-family: var(--font);
    font-size: 11px;
    padding: 4px 8px;
    cursor: pointer;
    outline: none;
    width: 100%;
  }

  /* ── BUTTONS ── */
  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-left: auto;
  }

  .btn-row {
    display: flex;
    gap: 6px;
  }

  button {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--border);
    font-family: var(--font);
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 7px 14px;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
    white-space: nowrap;
  }

  button:hover { background: #1a1a1a; border-color: #444; }
  button.active { border-color: var(--fg); }
  button.export { font-size: 10px; padding: 5px 10px; color: var(--label); border-color: #1e1e1e; }
  button.export:hover { color: var(--fg); border-color: #444; }

  /* ── STATUS BAR ── */
  #status {
    position: absolute;
    bottom: 10px;
    left: 14px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="layout">
  <div id="canvas-wrap">
    <canvas id="main"></canvas>
    <div id="status">WAVE LINES — creative coding</div>
  </div>

  <div id="panel">

    <div class="ctrl-group">
      <div class="ctrl-label">Estilo</div>
      <select id="s-style">
        <option value="lines">Líneas simples</option>
        <option value="spikes">Spikes</option>
        <option value="segments">Segmentos</option>
        <option value="mixed">Mixto</option>
      </select>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-label">Cantidad</div>
      <div class="ctrl-row">
        <input type="range" id="s-count" min="5" max="120" value="45" step="1">
        <span class="val" id="v-count">45</span>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-label">Longitud</div>
      <div class="ctrl-row">
        <input type="range" id="s-length" min="0.1" max="1.0" value="0.75" step="0.01">
        <span class="val" id="v-length">75%</span>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-label">Λ Longitud de onda</div>
      <div class="ctrl-row">
        <input type="range" id="s-lambda" min="0.3" max="8" value="2" step="0.1">
        <span class="val" id="v-lambda">2.0</span>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-label">Velocidad de onda</div>
      <div class="ctrl-row">
        <input type="range" id="s-speed" min="0.1" max="4" value="0.8" step="0.05">
        <span class="val" id="v-speed">0.80</span>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-label">Amortiguación</div>
      <div class="ctrl-row">
        <input type="range" id="s-damp" min="0" max="1" value="0" step="0.01">
        <span class="val" id="v-damp">0%</span>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-label">Grosor</div>
      <div class="ctrl-row">
        <input type="range" id="s-thick" min="0.5" max="8" value="1.5" step="0.1">
        <span class="val" id="v-thick">1.5</span>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-label">Color fondo</div>
      <select id="s-bg">
        <option value="black">Negro</option>
        <option value="white">Blanco</option>
        <option value="amber">Ámbar</option>
        <option value="orange">Naranja</option>
      </select>
    </div>

    <div class="btn-group">
      <div class="btn-row">
        <button id="btn-play" class="active" onclick="togglePlay()">⏸ PAUSAR</button>
        <button onclick="randomize()">⟳ ALEATORIO</button>
      </div>
      <div class="btn-row">
        <button class="export" onclick="exportPNG()">↓ PNG</button>
        <button class="export" onclick="exportSVG()">↓ SVG</button>
        <button class="export" onclick="resetDefaults()">RESET</button>
      </div>
    </div>

  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────
const canvas = document.getElementById('main');
const ctx = canvas.getContext('2d');
let W = 1200, H = 600;
let playing = true;
let t = 0;
let rafId = null;

// ── RESIZE ─────────────────────────────────────────
function resize() {
  const wrap = document.getElementById('canvas-wrap');
  const ww = wrap.clientWidth;
  const wh = wrap.clientHeight;
  const ratio = ww / wh;
  // maintain 2:1 internal resolution
  W = 1200;
  H = 600;
  canvas.width = W;
  canvas.height = H;
  // css scaling
  if (ratio > 2) {
    canvas.style.height = '100%';
    canvas.style.width = 'auto';
  } else {
    canvas.style.width = '100%';
    canvas.style.height = 'auto';
  }
}

// ── PARAMS ─────────────────────────────────────────
function p(id) {
  const el = document.getElementById(id);
  return el.type === 'range' ? parseFloat(el.value) : el.value;
}

const PALETTE = {
  black:  { bg: '#000000', fg: '#ffffff' },
  white:  { bg: '#ffffff', fg: '#000000' },
  amber:  { bg: '#F0A500', fg: '#000000' },
  orange: { bg: '#E84B00', fg: '#000000' },
};

// ── WAVE PHYSICS ───────────────────────────────────
// Each column i at normalized position x ∈ [0,1]
// Height = A(x) * sin(2π * x / λ - ω * t)
// ω (angular frequency) = speed
// A(x) = max_len * [damping envelope]
function waveAt(xNorm, tNow) {
  const lambda = p('s-lambda');   // wavelengths across the canvas
  const speed  = p('s-speed');
  const damp   = p('s-damp');
  const maxLen = p('s-length');

  const phase = (2 * Math.PI * xNorm * lambda) - (speed * tNow);
  const amp   = maxLen * Math.sin(phase);

  // Gaussian damping envelope centred at edges — softens both ends
  let envelope = 1;
  if (damp > 0) {
    const sigma = 0.35 * (1 - damp * 0.9);
    const d = xNorm - 0.5;
    envelope = Math.exp(-(d * d) / (2 * sigma * sigma));
  }

  return amp * envelope; // ∈ [-maxLen, maxLen]
}

// ── DRAW ───────────────────────────────────────────
function drawFrame() {
  const count  = Math.round(p('s-count'));
  const maxLen = p('s-length');
  const thick  = p('s-thick');
  const style  = p('s-style');
  const pal    = PALETTE[p('s-bg')];

  ctx.fillStyle = pal.bg;
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = pal.fg;
  ctx.lineWidth = thick;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  const marginX = W * 0.04;
  const usableW = W - marginX * 2;
  const cy = H / 2;
  const maxH = H * 0.46;

  // Pre-compute line styles for 'mixed'
  const styles = ['lines', 'spikes', 'segments'];

  for (let i = 0; i < count; i++) {
    const xNorm = i / Math.max(count - 1, 1);
    const x = marginX + xNorm * usableW;
    const wv = waveAt(xNorm, t);
    const halfLen = wv * maxH;  // signed: positive = spike up

    const absLen = Math.abs(halfLen);
    if (absLen < 0.5) continue;

    const ls = style === 'mixed' ? styles[i % 3] : style;

    ctx.save();
    ctx.translate(x, cy);

    if (ls === 'lines') {
      drawLine(absLen, halfLen < 0);
    } else if (ls === 'spikes') {
      drawSpike(absLen, halfLen < 0, thick);
    } else if (ls === 'segments') {
      drawSegments(absLen, halfLen < 0, thick);
    }

    ctx.restore();
  }
}

function drawLine(len, flip) {
  const sign = flip ? 1 : -1;
  ctx.beginPath();
  ctx.moveTo(0, sign * len);
  ctx.lineTo(0, -sign * len);
  ctx.stroke();
}

function drawSpike(len, flip, thick) {
  const sign = flip ? 1 : -1;
  const tip = 5 + thick * 2;
  // full line
  ctx.beginPath();
  ctx.moveTo(0, sign * len);
  ctx.lineTo(0, -sign * len);
  ctx.stroke();
  // arrowhead at the peak (negative direction)
  ctx.beginPath();
  ctx.moveTo(-tip, -sign * (len - tip * 2.2));
  ctx.lineTo(0, -sign * len);
  ctx.lineTo(tip, -sign * (len - tip * 2.2));
  ctx.stroke();
}

function drawSegments(len, flip, thick) {
  const sign = flip ? 1 : -1;
  const segs = 3;
  const total = len * 2;
  const segH = total / segs;
  const gap = Math.max(3, segH * 0.2);
  const bw = thick * 4;

  for (let s = 0; s < segs; s++) {
    const top = -sign * len + sign * s * segH + sign * gap / 2;
    const bot = top + sign * (segH - gap);
    ctx.beginPath();
    ctx.moveTo(0, top);
    ctx.lineTo(0, bot);
    ctx.stroke();
    // crossbars
    const b1 = top + sign * (segH - gap) * 0.2;
    const b2 = top + sign * (segH - gap) * 0.8;
    ctx.beginPath();
    ctx.moveTo(-bw, b1); ctx.lineTo(bw, b1);
    ctx.moveTo(-bw, b2); ctx.lineTo(bw, b2);
    ctx.stroke();
  }
}

// ── LOOP ───────────────────────────────────────────
function loop() {
  if (playing) t += 0.016;
  drawFrame();
  rafId = requestAnimationFrame(loop);
}

// ── CONTROLS ───────────────────────────────────────
function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('btn-play');
  btn.textContent = playing ? '⏸ PAUSAR' : '▶ ANIMAR';
  btn.classList.toggle('active', playing);
}

function randomize() {
  setVal('s-count', ri(12, 80));
  setVal('s-length', rf(0.35, 0.95));
  setVal('s-lambda', rf(0.5, 6));
  setVal('s-speed',  rf(0.2, 2.5));
  setVal('s-damp',   rf(0, 0.8));
  setVal('s-thick',  rf(0.8, 5));
  document.getElementById('s-style').value = ['lines','spikes','segments','mixed'][ri(0,3)];
  document.getElementById('s-bg').value = ['black','white','amber','orange'][ri(0,3)];
  updateLabels();
}

function resetDefaults() {
  setVal('s-count', 45); setVal('s-length', 0.75); setVal('s-lambda', 2);
  setVal('s-speed', 0.8); setVal('s-damp', 0); setVal('s-thick', 1.5);
  document.getElementById('s-style').value = 'lines';
  document.getElementById('s-bg').value = 'black';
  updateLabels();
}

function ri(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function rf(a, b) { return +(a + Math.random() * (b - a)).toFixed(3); }
function setVal(id, v) { document.getElementById(id).value = v; }

// ── LABELS ─────────────────────────────────────────
const labelMap = {
  'v-count':  () => Math.round(p('s-count')),
  'v-length': () => Math.round(p('s-length') * 100) + '%',
  'v-lambda': () => p('s-lambda').toFixed(1),
  'v-speed':  () => p('s-speed').toFixed(2),
  'v-damp':   () => Math.round(p('s-damp') * 100) + '%',
  'v-thick':  () => p('s-thick').toFixed(1),
};

function updateLabels() {
  for (const [id, fn] of Object.entries(labelMap)) {
    const el = document.getElementById(id);
    if (el) el.textContent = fn();
  }
}

document.querySelectorAll('input[type=range]').forEach(input => {
  input.addEventListener('input', updateLabels);
});

// ── EXPORT PNG ─────────────────────────────────────
function exportPNG() {
  drawFrame(); // ensure current frame
  const link = document.createElement('a');
  link.download = 'wave-lines-' + Date.now() + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ── EXPORT SVG ─────────────────────────────────────
function exportSVG() {
  const count  = Math.round(p('s-count'));
  const maxLen = p('s-length');
  const thick  = p('s-thick');
  const style  = p('s-style');
  const pal    = PALETTE[p('s-bg')];

  const marginX = W * 0.04;
  const usableW = W - marginX * 2;
  const cy = H / 2;
  const maxH = H * 0.46;
  const styles = ['lines', 'spikes', 'segments'];

  let paths = '';

  for (let i = 0; i < count; i++) {
    const xNorm = i / Math.max(count - 1, 1);
    const x = marginX + xNorm * usableW;
    const wv = waveAt(xNorm, t);
    const halfLen = wv * maxH;
    const absLen = Math.abs(halfLen);
    if (absLen < 0.5) continue;
    const flip = halfLen < 0;
    const ls = style === 'mixed' ? styles[i % 3] : style;

    const ax = x;
    const cy2 = cy;

    if (ls === 'lines') {
      const y1 = cy2 - (flip ? -absLen : absLen);
      const y2 = cy2 + (flip ? -absLen : absLen);
      paths += `<line x1="${ax.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${ax.toFixed(1)}" y2="${y2.toFixed(1)}"/>`;

    } else if (ls === 'spikes') {
      const sign = flip ? 1 : -1;
      const tip = 5 + thick * 2;
      const yTop = cy2 - sign * absLen;
      const yBot = cy2 + sign * absLen;
      paths += `<line x1="${ax.toFixed(1)}" y1="${yBot.toFixed(1)}" x2="${ax.toFixed(1)}" y2="${yTop.toFixed(1)}"/>`;
      paths += `<polyline points="${(ax-tip).toFixed(1)},${(yTop + sign*(tip*2.2)).toFixed(1)} ${ax.toFixed(1)},${yTop.toFixed(1)} ${(ax+tip).toFixed(1)},${(yTop + sign*(tip*2.2)).toFixed(1)}"/>`;

    } else if (ls === 'segments') {
      const sign = flip ? 1 : -1;
      const segs = 3;
      const total = absLen * 2;
      const segH = total / segs;
      const gap = Math.max(3, segH * 0.2);
      const bw = thick * 4;
      for (let s = 0; s < segs; s++) {
        const top = cy2 - sign * absLen + sign * s * segH + sign * gap / 2;
        const bot = top + sign * (segH - gap);
        paths += `<line x1="${ax.toFixed(1)}" y1="${top.toFixed(1)}" x2="${ax.toFixed(1)}" y2="${bot.toFixed(1)}"/>`;
        const b1 = top + sign * (segH - gap) * 0.2;
        const b2 = top + sign * (segH - gap) * 0.8;
        paths += `<line x1="${(ax-bw).toFixed(1)}" y1="${b1.toFixed(1)}" x2="${(ax+bw).toFixed(1)}" y2="${b1.toFixed(1)}"/>`;
        paths += `<line x1="${(ax-bw).toFixed(1)}" y1="${b2.toFixed(1)}" x2="${(ax+bw).toFixed(1)}" y2="${b2.toFixed(1)}"/>`;
      }
    }
  }

  const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
  <rect width="${W}" height="${H}" fill="${pal.bg}"/>
  <g stroke="${pal.fg}" stroke-width="${thick.toFixed(1)}" stroke-linecap="round" stroke-linejoin="round" fill="none">
    ${paths}
  </g>
</svg>`;

  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const link = document.createElement('a');
  link.download = 'wave-lines-' + Date.now() + '.svg';
  link.href = URL.createObjectURL(blob);
  link.click();
  URL.revokeObjectURL(link.href);
}

// ── INIT ───────────────────────────────────────────
window.addEventListener('resize', resize);
resize();
updateLabels();
loop();
</script>
</body>
</html>
