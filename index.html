<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Lines — Creative Coding</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --fg: #ffffff;
    --panel: #111111;
    --border: #222222;
    --muted: #555555;
    --label: #888888;
    --font: 'Space Mono', monospace;
  }

  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font);
    font-size: 13px;
    height: 100%;
    overflow: hidden;
  }

  #layout {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  canvas#main {
    display: block;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  #panel {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    gap: 24px;
    align-items: center;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .ctrl-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-width: 115px;
  }

  .ctrl-label {
    color: var(--label);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: var(--border);
    outline: none;
    flex: 1;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--fg);
    cursor: pointer;
  }

  input[type=range]::-moz-range-thumb {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--fg);
    cursor: pointer;
    border: none;
  }

  .val {
    font-size: 11px;
    color: var(--fg);
    min-width: 32px;
    text-align: right;
    letter-spacing: 0.04em;
  }

  select {
    background: #1a1a1a;
    color: var(--fg);
    border: 1px solid var(--border);
    font-family: var(--font);
    font-size: 11px;
    padding: 4px 8px;
    cursor: pointer;
    outline: none;
    width: 100%;
  }

  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-left: auto;
  }

  .btn-row { display: flex; gap: 6px; }

  button {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--border);
    font-family: var(--font);
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 7px 14px;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
    white-space: nowrap;
  }

  button:hover { background: #1a1a1a; border-color: #444; }
  button.active { border-color: var(--fg); }
  button.export { font-size: 10px; padding: 5px 10px; color: var(--label); border-color: #1e1e1e; }
  button.export:hover { color: var(--fg); border-color: #444; }

  #status {
    position: absolute;
    bottom: 10px;
    left: 14px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="layout">
  <div id="canvas-wrap">
    <canvas id="main"></canvas>
    <div id="status">WAVE LINES — creative coding</div>
  </div>

  <div id="panel">

    <div class="ctrl-group">
      <div class="ctrl-label">Estilo</div>
      <select id="s-style">
        <option value="lines">Líneas simples</option>
        <option value="taper">Espiga (punta)</option>
        <option value="piano">Piano (teclas)</option>
        <option value="spikes">Spikes (flecha)</option>
        <option value="segments">Segmentos</option>
        <option value="mixed">Mixto</option>
      </select>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-label">Cantidad</div>
      <div class="ctrl-row">
        <input type="range" id="s-count" min="5" max="120" value="45" step="1">
        <span class="val" id="v-count">45</span>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-label">Longitud</div>
      <div class="ctrl-row">
        <input type="range" id="s-length" min="0.1" max="1.0" value="0.75" step="0.01">
        <span class="val" id="v-length">75%</span>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-label">Λ Long. de onda</div>
      <div class="ctrl-row">
        <input type="range" id="s-lambda" min="0.3" max="8" value="2" step="0.1">
        <span class="val" id="v-lambda">2.0</span>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-label">Velocidad</div>
      <div class="ctrl-row">
        <input type="range" id="s-speed" min="0.1" max="4" value="0.8" step="0.05">
        <span class="val" id="v-speed">0.80</span>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-label">Amortiguación</div>
      <div class="ctrl-row">
        <input type="range" id="s-damp" min="0" max="1" value="0" step="0.01">
        <span class="val" id="v-damp">0%</span>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-label">Grosor base</div>
      <div class="ctrl-row">
        <input type="range" id="s-thick" min="1" max="24" value="6" step="0.5">
        <span class="val" id="v-thick">6.0</span>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-label">Color fondo</div>
      <select id="s-bg">
        <option value="black">Negro</option>
        <option value="white">Blanco</option>
        <option value="amber">Ámbar</option>
        <option value="orange">Naranja</option>
      </select>
    </div>

    <div class="btn-group">
      <div class="btn-row">
        <button id="btn-play" class="active" onclick="togglePlay()">⏸ PAUSAR</button>
        <button onclick="randomize()">⟳ ALEATORIO</button>
      </div>
      <div class="btn-row">
        <button class="export" onclick="exportPNG()">↓ PNG</button>
        <button class="export" onclick="exportSVG()">↓ SVG</button>
        <button class="export" onclick="resetDefaults()">RESET</button>
      </div>
    </div>

  </div>
</div>

<script>
// ── STATE ────────────────────────────────────────────────────
const canvas = document.getElementById('main');
const ctx = canvas.getContext('2d');
let W = 1200, H = 600;
let playing = true;
let t = 0;

// ── RESIZE ───────────────────────────────────────────────────
function resize() {
  W = 1200; H = 600;
  canvas.width = W;
  canvas.height = H;
  const wrap = document.getElementById('canvas-wrap');
  const ratio = wrap.clientWidth / wrap.clientHeight;
  if (ratio > 2) { canvas.style.height = '100%'; canvas.style.width = 'auto'; }
  else           { canvas.style.width  = '100%'; canvas.style.height = 'auto'; }
}

// ── PARAMS ───────────────────────────────────────────────────
function p(id) {
  const el = document.getElementById(id);
  return el.type === 'range' ? parseFloat(el.value) : el.value;
}

const PALETTE = {
  black:  { bg: '#000000', fg: '#ffffff' },
  white:  { bg: '#ffffff', fg: '#000000' },
  amber:  { bg: '#F0A500', fg: '#000000' },
  orange: { bg: '#E84B00', fg: '#000000' },
};

// ── WAVE PHYSICS ─────────────────────────────────────────────
// Travelling wave: amplitude = A · sin(2π · x · λ − ω · t)
function waveAt(xNorm, tNow) {
  const lambda = p('s-lambda');
  const speed  = p('s-speed');
  const damp   = p('s-damp');
  const maxLen = p('s-length');

  const phase = (2 * Math.PI * xNorm * lambda) - (speed * tNow);
  const amp   = maxLen * Math.sin(phase);

  let envelope = 1;
  if (damp > 0) {
    const sigma = 0.35 * (1 - damp * 0.9);
    const d = xNorm - 0.5;
    envelope = Math.exp(-(d * d) / (2 * sigma * sigma));
  }
  return amp * envelope;
}

// ── HELPERS ──────────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y,     x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x,     y + h, x,     y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x,     y,     x + r, y);
  ctx.closePath();
}

// ── SHAPE RENDERERS ──────────────────────────────────────────
// All work in translated coords: origin at column centre (cy).
// len  = half-length (total span = len * 2)
// sign = +1 wave up, −1 wave down
// thick = base width parameter from slider

// 1. LÍNEA SIMPLE
function drawLine(len, thick) {
  ctx.lineWidth = Math.max(0.5, thick * 0.22);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, -len);
  ctx.lineTo(0,  len);
  ctx.stroke();
}

// 2. ESPIGA — filled fusiform shape, bezier-tapered at both tips
// Wider at the belly (70% of len from the peak), needle-sharp at both ends.
function drawTaper(len, sign, thick) {
  const hw  = thick * 0.52;   // half-width at the fattest point
  const yPeak = -sign * len;  // tip in wave direction (sharper)
  const yBase =  sign * len;  // opposite tip

  // Belly is centred at 0 but biased slightly toward the base
  ctx.beginPath();
  ctx.moveTo(0, yPeak);
  // right side: peak → right belly → base tip
  ctx.bezierCurveTo(
    hw * 0.08, yPeak * 0.55,
    hw,        yPeak * 0.08,
    hw,        0
  );
  ctx.bezierCurveTo(
    hw,        yBase * 0.08,
    hw * 0.08, yBase * 0.55,
    0,         yBase
  );
  // left side: base tip → left belly → peak (mirror)
  ctx.bezierCurveTo(
    -hw * 0.08, yBase * 0.55,
    -hw,        yBase * 0.08,
    -hw,        0
  );
  ctx.bezierCurveTo(
    -hw,        yPeak * 0.08,
    -hw * 0.08, yPeak * 0.55,
    0,          yPeak
  );
  ctx.closePath();
  ctx.fill();
}

// 3. PIANO — white key (tall filled rect) + black key (short narrow rect at peak)
// The gap between adjacent white keys creates the dark slit — no stroke needed.
function drawPiano(len, sign, thick, fg, bg) {
  const wKeyW = Math.max(5, thick * 0.88);   // white key width
  const bKeyW = wKeyW * 0.52;               // black key narrower
  const bKeyH = len * 2 * 0.58;             // black key = 58% of total height
  const r     = 2;

  // White key: spans full -len to +len
  const yTop = -len;
  roundRect(ctx, -wKeyW / 2, yTop, wKeyW, len * 2, r);
  ctx.fillStyle = fg;
  ctx.fill();

  // Black key: anchored at the PEAK end (sign controls direction)
  // Peak = -sign * len in translated coords → y = -sign * len relative to centre
  const bTop = -sign * len;
  const bH   = sign * bKeyH;  // signed height so it always overlaps peak
  roundRect(ctx, -bKeyW / 2, Math.min(bTop, bTop + bH), bKeyW, Math.abs(bH), r * 0.5);
  ctx.fillStyle = bg;
  ctx.fill();
}

// 4. SPIKE / FLECHA
function drawSpike(len, sign, thick) {
  const lw  = Math.max(0.5, thick * 0.22);
  const tip = 4 + thick * 0.7;
  const yPeak = -sign * len;
  const yBase =  sign * len;
  ctx.lineWidth = lw;
  ctx.lineCap  = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(0, yBase);
  ctx.lineTo(0, yPeak);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-tip, yPeak + sign * tip * 2.2);
  ctx.lineTo(0, yPeak);
  ctx.lineTo( tip, yPeak + sign * tip * 2.2);
  ctx.stroke();
}

// 5. SEGMENTOS
function drawSegments(len, sign, thick) {
  const lw   = Math.max(0.5, thick * 0.22);
  const segs = 3;
  const segH = (len * 2) / segs;
  const gap  = Math.max(3, segH * 0.2);
  const bw   = thick * 0.85;
  ctx.lineWidth = lw;
  ctx.lineCap  = 'round';
  for (let s = 0; s < segs; s++) {
    const top = -sign * len + sign * s * segH + sign * gap / 2;
    const bot = top + sign * (segH - gap);
    ctx.beginPath();
    ctx.moveTo(0, top);
    ctx.lineTo(0, bot);
    ctx.stroke();
    const b1 = top + sign * (segH - gap) * 0.2;
    const b2 = top + sign * (segH - gap) * 0.8;
    ctx.beginPath();
    ctx.moveTo(-bw, b1); ctx.lineTo(bw, b1);
    ctx.moveTo(-bw, b2); ctx.lineTo(bw, b2);
    ctx.stroke();
  }
}

// ── DRAW FRAME ───────────────────────────────────────────────
const ALL_STYLES = ['lines', 'taper', 'piano', 'spikes', 'segments'];

function drawFrame() {
  const count = Math.round(p('s-count'));
  const thick = p('s-thick');
  const style = p('s-style');
  const pal   = PALETTE[p('s-bg')];

  ctx.fillStyle = pal.bg;
  ctx.fillRect(0, 0, W, H);

  const marginX = W * 0.04;
  const usableW = W - marginX * 2;
  const cy      = H / 2;
  const maxH    = H * 0.46;

  for (let i = 0; i < count; i++) {
    const xNorm   = i / Math.max(count - 1, 1);
    const x       = marginX + xNorm * usableW;
    const wv      = waveAt(xNorm, t);
    const halfLen = wv * maxH;
    const absLen  = Math.abs(halfLen);
    if (absLen < 1.5) continue;

    const sign = halfLen >= 0 ? 1 : -1;
    const ls   = style === 'mixed' ? ALL_STYLES[i % ALL_STYLES.length] : style;

    ctx.save();
    ctx.translate(x, cy);
    ctx.strokeStyle = pal.fg;
    ctx.fillStyle   = pal.fg;
    ctx.lineJoin    = 'round';

    if      (ls === 'lines')    drawLine(absLen, thick);
    else if (ls === 'taper')    drawTaper(absLen, sign, thick);
    else if (ls === 'piano')    drawPiano(absLen, sign, thick, pal.fg, pal.bg);
    else if (ls === 'spikes')   drawSpike(absLen, sign, thick);
    else if (ls === 'segments') drawSegments(absLen, sign, thick);

    ctx.restore();
  }
}

// ── LOOP ─────────────────────────────────────────────────────
function loop() {
  if (playing) t += 0.016;
  drawFrame();
  requestAnimationFrame(loop);
}

// ── CONTROLS ─────────────────────────────────────────────────
function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('btn-play');
  btn.textContent = playing ? '⏸ PAUSAR' : '▶ ANIMAR';
  btn.classList.toggle('active', playing);
}

function randomize() {
  setVal('s-count',  ri(12, 80));
  setVal('s-length', rf(0.35, 0.95));
  setVal('s-lambda', rf(0.5, 6));
  setVal('s-speed',  rf(0.2, 2.5));
  setVal('s-damp',   rf(0, 0.8));
  setVal('s-thick',  rf(2, 18));
  document.getElementById('s-style').value = ['lines','taper','piano','spikes','segments','mixed'][ri(0,5)];
  document.getElementById('s-bg').value = ['black','white','amber','orange'][ri(0,3)];
  updateLabels();
}

function resetDefaults() {
  setVal('s-count', 45); setVal('s-length', 0.75); setVal('s-lambda', 2);
  setVal('s-speed', 0.8); setVal('s-damp', 0); setVal('s-thick', 6);
  document.getElementById('s-style').value = 'lines';
  document.getElementById('s-bg').value = 'black';
  updateLabels();
}

function ri(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function rf(a, b) { return +(a + Math.random() * (b - a)).toFixed(3); }
function setVal(id, v) { document.getElementById(id).value = v; }

// ── LABELS ───────────────────────────────────────────────────
const labelMap = {
  'v-count':  () => Math.round(p('s-count')),
  'v-length': () => Math.round(p('s-length') * 100) + '%',
  'v-lambda': () => p('s-lambda').toFixed(1),
  'v-speed':  () => p('s-speed').toFixed(2),
  'v-damp':   () => Math.round(p('s-damp') * 100) + '%',
  'v-thick':  () => p('s-thick').toFixed(1),
};

function updateLabels() {
  for (const [id, fn] of Object.entries(labelMap)) {
    const el = document.getElementById(id);
    if (el) el.textContent = fn();
  }
}

document.querySelectorAll('input[type=range]').forEach(el => {
  el.addEventListener('input', updateLabels);
});

// ── EXPORT PNG ───────────────────────────────────────────────
function exportPNG() {
  drawFrame();
  const link = document.createElement('a');
  link.download = 'wave-lines-' + Date.now() + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ── EXPORT SVG ───────────────────────────────────────────────
function exportSVG() {
  const count = Math.round(p('s-count'));
  const thick = p('s-thick');
  const style = p('s-style');
  const pal   = PALETTE[p('s-bg')];

  const marginX = W * 0.04;
  const usableW = W - marginX * 2;
  const cy      = H / 2;
  const maxH    = H * 0.46;

  let paths = '';
  const lw = (Math.max(0.5, thick * 0.22)).toFixed(2);

  for (let i = 0; i < count; i++) {
    const xNorm   = i / Math.max(count - 1, 1);
    const x       = marginX + xNorm * usableW;
    const wv      = waveAt(xNorm, t);
    const halfLen = wv * maxH;
    const absLen  = Math.abs(halfLen);
    if (absLen < 1.5) continue;

    const sign = halfLen >= 0 ? 1 : -1;
    const ls   = style === 'mixed' ? ALL_STYLES[i % ALL_STYLES.length] : style;

    const yPeak = cy - sign * absLen;
    const yBase = cy + sign * absLen;

    if (ls === 'lines') {
      paths += `<line x1="${x.toFixed(1)}" y1="${yPeak.toFixed(1)}" x2="${x.toFixed(1)}" y2="${yBase.toFixed(1)}" stroke-width="${(thick*0.25).toFixed(2)}" stroke-linecap="round"/>`;

    } else if (ls === 'taper') {
      const hw = thick * 0.52;
      paths += `<path d="
        M ${x.toFixed(2)},${yPeak.toFixed(2)}
        C ${(x+hw*0.08).toFixed(2)},${(yPeak+(cy-yPeak)*0.55).toFixed(2)} ${(x+hw).toFixed(2)},${(yPeak+(cy-yPeak)*0.92).toFixed(2)} ${(x+hw).toFixed(2)},${cy.toFixed(2)}
        C ${(x+hw).toFixed(2)},${(cy+(yBase-cy)*0.08).toFixed(2)} ${(x+hw*0.08).toFixed(2)},${(cy+(yBase-cy)*0.55).toFixed(2)} ${x.toFixed(2)},${yBase.toFixed(2)}
        C ${(x-hw*0.08).toFixed(2)},${(cy+(yBase-cy)*0.55).toFixed(2)} ${(x-hw).toFixed(2)},${(cy+(yBase-cy)*0.08).toFixed(2)} ${(x-hw).toFixed(2)},${cy.toFixed(2)}
        C ${(x-hw).toFixed(2)},${(yPeak+(cy-yPeak)*0.92).toFixed(2)} ${(x-hw*0.08).toFixed(2)},${(yPeak+(cy-yPeak)*0.55).toFixed(2)} ${x.toFixed(2)},${yPeak.toFixed(2)} Z
      " fill="${pal.fg}" stroke="none"/>`;

    } else if (ls === 'piano') {
      const wKeyW = Math.max(5, thick * 0.88);
      const bKeyW = wKeyW * 0.52;
      const bKeyH = absLen * 2 * 0.58;
      const yTop  = cy - absLen;
      const bTopY = Math.min(yPeak, yPeak + sign * bKeyH);
      paths += `<rect x="${(x-wKeyW/2).toFixed(2)}" y="${yTop.toFixed(2)}" width="${wKeyW.toFixed(2)}" height="${(absLen*2).toFixed(2)}" rx="2" fill="${pal.fg}" stroke="none"/>`;
      paths += `<rect x="${(x-bKeyW/2).toFixed(2)}" y="${bTopY.toFixed(2)}" width="${bKeyW.toFixed(2)}" height="${Math.abs(bKeyH).toFixed(2)}" rx="1" fill="${pal.bg}" stroke="none"/>`;

    } else if (ls === 'spikes') {
      const tip = 4 + thick * 0.7;
      paths += `<line x1="${x.toFixed(1)}" y1="${yBase.toFixed(1)}" x2="${x.toFixed(1)}" y2="${yPeak.toFixed(1)}" stroke-width="${lw}" stroke-linecap="round"/>`;
      paths += `<polyline points="${(x-tip).toFixed(1)},${(yPeak+sign*tip*2.2).toFixed(1)} ${x.toFixed(1)},${yPeak.toFixed(1)} ${(x+tip).toFixed(1)},${(yPeak+sign*tip*2.2).toFixed(1)}" stroke-width="${lw}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;

    } else if (ls === 'segments') {
      const segs = 3;
      const segH = (absLen * 2) / segs;
      const gap  = Math.max(3, segH * 0.2);
      const bw   = thick * 0.85;
      for (let s = 0; s < segs; s++) {
        const top = yPeak + sign * s * segH + sign * gap / 2;
        const bot = top + sign * (segH - gap);
        const b1  = top + sign * (segH - gap) * 0.2;
        const b2  = top + sign * (segH - gap) * 0.8;
        paths += `<line x1="${x.toFixed(1)}" y1="${top.toFixed(1)}" x2="${x.toFixed(1)}" y2="${bot.toFixed(1)}" stroke-width="${lw}" stroke-linecap="round"/>`;
        paths += `<line x1="${(x-bw).toFixed(1)}" y1="${b1.toFixed(1)}" x2="${(x+bw).toFixed(1)}" y2="${b1.toFixed(1)}" stroke-width="${lw}" stroke-linecap="round"/>`;
        paths += `<line x1="${(x-bw).toFixed(1)}" y1="${b2.toFixed(1)}" x2="${(x+bw).toFixed(1)}" y2="${b2.toFixed(1)}" stroke-width="${lw}" stroke-linecap="round"/>`;
      }
    }
  }

  const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
  <rect width="${W}" height="${H}" fill="${pal.bg}"/>
  <g stroke="${pal.fg}" fill="none">${paths}</g>
</svg>`;

  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const link = document.createElement('a');
  link.download = 'wave-lines-' + Date.now() + '.svg';
  link.href = URL.createObjectURL(blob);
  link.click();
  URL.revokeObjectURL(link.href);
}

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('resize', resize);
resize();
updateLabels();
loop();
</script>
</body>
